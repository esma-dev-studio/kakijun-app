<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FBF7F0">
    <meta name="description" content="ひらがな・カタカナ・小学1〜2年生の漢字332文字の書き順を、アニメーションとなぞり練習で楽しく覚えられる子ども向けアプリ">
    <title>かきじゅんマスター</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖌️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
    <!-- ホーム -->
    <div id="screen-home" class="screen active">
        <button id="btn-sound" class="sound-btn" aria-label="おとの オン・オフ">🔊</button>

        <header class="home-hero">
            <div class="hero-badge" aria-hidden="true">🖌️</div>
            <h1 class="app-title"><span class="title-mark">かきじゅんマスター</span></h1>
            <p class="app-subtitle">ひらがな・カタカナ・かんじの かきじゅんを<br>たのしく おぼえよう!</p>
        </header>

        <!-- プレイヤーダッシュボード -->
        <section class="player-card" aria-label="あなたの きろく">
            <div class="player-main">
                <div class="level-ring" id="level-ring">
                    <div class="level-ring-inner">
                        <span class="level-cap">レベル</span>
                        <span id="player-level" class="level-num">1</span>
                    </div>
                </div>
                <div class="player-info">
                    <div class="player-info-top">
                        <span class="xp-next">つぎの レベルまで</span>
                        <span id="xp-text" class="xp-text">0 / 40</span>
                    </div>
                    <div class="xp-bar"><span id="xp-fill" class="xp-fill"></span></div>
                    <div class="daily-row">
                        <span class="daily-label">きょうの もくひょう</span>
                        <span id="daily-dots" class="daily-dots"></span>
                    </div>
                </div>
            </div>
            <div class="stat-chips">
                <div class="stat-chip">
                    <span class="stat-ico">🔥</span>
                    <span class="stat-val" id="stat-streak">0</span>
                    <span class="stat-cap">れんぞく</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-ico">⭐</span>
                    <span class="stat-val" id="stat-stars">0</span>
                    <span class="stat-cap">ほし</span>
                </div>
                <button id="btn-badges" class="stat-chip chip-btn">
                    <span class="stat-ico">🏅</span>
                    <span class="stat-val" id="stat-badges">0</span>
                    <span class="stat-cap">バッジ ›</span>
                </button>
            </div>
        </section>

        <nav class="cat-buttons">
            <button id="btn-cat-hiragana" class="cat-btn" data-cat="hiragana">
                <span class="cat-sample" aria-hidden="true">あ</span>
                <span class="cat-body">
                    <span class="cat-name">ひらがな</span>
                    <span class="cat-bar"><span class="cat-bar-fill"></span></span>
                </span>
                <span class="cat-progress"></span>
                <span class="cat-chevron" aria-hidden="true">›</span>
            </button>
            <button id="btn-cat-katakana" class="cat-btn" data-cat="katakana">
                <span class="cat-sample" aria-hidden="true">ア</span>
                <span class="cat-body">
                    <span class="cat-name">カタカナ</span>
                    <span class="cat-bar"><span class="cat-bar-fill"></span></span>
                </span>
                <span class="cat-progress"></span>
                <span class="cat-chevron" aria-hidden="true">›</span>
            </button>
            <button id="btn-cat-kanji1" class="cat-btn" data-cat="kanji1">
                <span class="cat-sample" aria-hidden="true">一</span>
                <span class="cat-body">
                    <span class="cat-name">かんじ 1ねんせい</span>
                    <span class="cat-bar"><span class="cat-bar-fill"></span></span>
                </span>
                <span class="cat-progress"></span>
                <span class="cat-chevron" aria-hidden="true">›</span>
            </button>
            <button id="btn-cat-kanji2" class="cat-btn" data-cat="kanji2">
                <span class="cat-sample" aria-hidden="true">引</span>
                <span class="cat-body">
                    <span class="cat-name">かんじ 2ねんせい</span>
                    <span class="cat-bar"><span class="cat-bar-fill"></span></span>
                </span>
                <span class="cat-progress"></span>
                <span class="cat-chevron" aria-hidden="true">›</span>
            </button>
        </nav>

        <footer class="credit">かきじゅんデータ: <a href="https://kanjivg.tagaini.net" target="_blank" rel="noopener">KanjiVG</a> © Ulrich Apel (CC BY-SA 3.0)</footer>
    </div>

    <!-- もじいちらん -->
    <div id="screen-list" class="screen">
        <header class="bar">
            <button id="btn-list-back" class="back-btn">← もどる</button>
            <h2 id="list-title"></h2>
            <span class="bar-spacer" aria-hidden="true"></span>
        </header>
        <div id="char-grid"></div>
    </div>

    <!-- れんしゅう -->
    <div id="screen-practice" class="screen">
        <header class="bar practice-bar">
            <button id="btn-practice-back" class="back-btn">← もどる</button>
            <button id="btn-prev-char" class="nav-btn" aria-label="まえの じ">‹</button>
            <div class="char-info">
                <span id="practice-char-label"></span>
                <span id="practice-stroke-count"></span>
            </div>
            <button id="btn-next-char" class="nav-btn" aria-label="つぎの じ">›</button>
        </header>

        <div class="practice-body">
        <div class="practice-main">
        <div class="mode-tabs" role="tablist">
            <button id="tab-watch" class="mode-tab active">👀 みる</button>
            <button id="tab-trace" class="mode-tab">✏️ なぞる</button>
        </div>

        <div class="stage-card">
            <svg id="stage" viewBox="0 0 109 109" aria-label="かきじゅんの おてほん"></svg>
        </div>

        <div id="trace-msg"></div>

        <!-- みる モード -->
        <div id="watch-controls">
            <button id="btn-play" class="big-btn">▶ さいせい</button>

            <div class="step-row" id="step-row">
                <button id="btn-step-prev" class="step-btn">◀ もどる</button>
                <button id="btn-step-next" class="step-btn">すすむ ▶</button>
            </div>

            <div class="speed-row" id="speed-row">
                <button class="speed-btn" data-speed="slow">🐢 ゆっくり</button>
                <button class="speed-btn active" data-speed="normal">🚶 ふつう</button>
                <button class="speed-btn" data-speed="fast">🐇 はやい</button>
            </div>

            <button id="btn-numbers" class="toggle-btn active">① ばんごう</button>
        </div>

        <!-- なぞる モード -->
        <div id="trace-controls" class="hidden">
            <button id="btn-trace-restart" class="big-btn ghost-btn">🔄 さいしょから</button>
        </div>
        </div><!-- /.practice-main -->

        <!-- よみ・いみ・ことば (じょうほうカード) — 広い画面では右側に並ぶ -->
        <section id="char-info-card" class="info-card hidden" aria-label="よみかたと いみ"></section>
        </div><!-- /.practice-body -->
    </div>

    <!-- バッジ コレクション -->
    <div id="screen-badges" class="screen">
        <header class="bar">
            <button id="btn-badges-back" class="back-btn">← もどる</button>
            <h2 id="badges-title">バッジ</h2>
            <span class="bar-spacer" aria-hidden="true"></span>
        </header>
        <p id="badges-summary" class="badges-summary"></p>
        <div id="badge-grid" class="badge-grid"></div>
    </div>

    <!-- かんせい おいわい -->
    <div id="overlay-celebrate">
        <div class="celebrate-box">
            <div class="hanamaru" aria-hidden="true">💮</div>
            <h2 id="celebrate-text">よくできました!</h2>
            <div id="celebrate-stars">
                <span class="star"></span>
                <span class="star"></span>
                <span class="star"></span>
            </div>
            <div id="celebrate-rewards" class="celebrate-rewards"></div>
            <div class="celebrate-btns">
                <button id="btn-celebrate-again">🔄 もういちど</button>
                <button id="btn-celebrate-next">つぎへ ▶</button>
            </div>
        </div>
        <div id="confetti-box"></div>
    </div>

    <!-- Scripts in order -->
    <script src="data/hiragana.js?v=5"></script>
    <script src="data/katakana.js?v=5"></script>
    <script src="data/kanji1.js?v=5"></script>
    <script src="data/kanji2.js?v=5"></script>
    <script src="data/kanainfo.js?v=5"></script>
    <script src="data/kanjiinfo.js?v=5"></script>
    <script src="js/sounds.js?v=5"></script>
    <script src="js/player.js?v=5"></script>
    <script src="js/tracer.js?v=5"></script>
    <script src="js/gamify.js?v=5"></script>
    <script src="js/app.js?v=5"></script>
</body>
</html>
